<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Audi Q7 Parking Simulator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>
    <div id="gameContainer">
        <!-- Спидометр и датчики -->
        <div class="dashboard">
            <div class="stat-item">SPEED: <span id="speedVal">0</span> km/h</div>
            <div class="stat-item">GEAR: <span id="gearVal">D</span></div>
            <div class="stat-item">LEVEL: <span id="levelVal">1</span> / 67</div>
        </div>

        <div id="gameArea">
            <!-- Парковочная зона -->
            <div id="parkingSlot">
                <div class="slot-border"></div>
                <span class="slot-text">PARK HERE</span>
            </div>

            <!-- Audi Q7 -->
            <div id="car">
                <div class="shadow"></div>
                <div class="q7-body">
                    <div class="glass"></div>
                    <div class="mirrors"></div>
                    <div class="lights-front"></div>
                    <div class="lights-rear"></div>
                </div>
            </div>
        </div>

        <!-- Интерактивный интерфейс управления (Руль и Педали) -->
        <div class="mobile-controls">
            <!-- Левая зона: Рулевое колесо -->
            <div class="steering-zone">
                <div id="steeringWheel">
                    <div class="wheel-line"></div>
                    <div class="wheel-center">Q7</div>
                </div>
            </div>

            <!-- Правая зона: Вертикальные педали -->
            <div class="pedals-zone">
                <div id="btn-brake" class="pedal pedal-brake">
                    <div class="pedal-texture"></div>
                    <span>BRAKE</span>
                </div>
                <div id="btn-gas" class="pedal pedal-gas">
                    <div class="pedal-texture"></div>
                    <span>GAS</span>
                </div>
            </div>
        </div>

        <!-- Меню -->
        <div class="overlay" id="menu">
            <h1 class="glitch-text">CAR PARKING</h1>
            <p>AUDI Q7 QUATTRO EDITION</p>
            <div class="controls-hint">
                W, S — Газ / Тормоз <br>
                A, D — Поворот руля
            </div>
            <button onclick="startParking()">START MISSION</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
